version: '3.8'

services:
  elasticsearch:
    image: pawong/elasticsearch:latest    # dockerhub에 push한 이미지
    container_name: pawong-prod-elasticsearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=${ES_JAVA_OPTS}
      - xpack.security.enabled=false
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - ELASTICSEARCH_PLUGINS=analysis-nori
    volumes:
      - ./infra/elasticsearch/config/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
      - ./infra/elasticsearch/data:/usr/share/elasticsearch/data
    ports:
      - "${ELASTIC_PORT}:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - prod-net

  backend:
    image: pawong/backend:latest    # dockerhub에 push한 이미지
    container_name: pawong-prod-backend
    env_file:   # .env 파일 로드하기
      - .env
    ports:
      - "${APP_PORT}:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    depends_on:
      - elasticsearch
    networks:
      - prod-net
  frontend:
    image: pawong/frontend:latest       # dockerhub에 push한 이미지
    container_name: pawong-prod-frontend
    depends_on:
      - backend
    networks:
      - prod-net
  nginx:
    image: nginx:latest
    container_name: pawong-prod-nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/conf/default-prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/nginx/logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - prod-net

networks:
  prod-net:
    driver: bridge