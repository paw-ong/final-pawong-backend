server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # 일반 backend 로그
  - job_name: backend-logs
    static_configs:
      - targets: ['localhost']
        labels:
          job: backend
          __path__: /var/log/backend/backend*.log

  # DLT 처리용 로그
  - job_name: backend-dlt-logs
    static_configs:
      - targets: ['localhost']
        labels:
          job: backend-dlt
          __path__: /var/log/backend/dlt*.log

  # frontend
  - job_name: frontend-logs
    static_configs:
      - targets: ['localhost']
        labels:
          job: frontend
          __path__: /var/log/frontend/*.log

  # nginx
  - job_name: nginx-logs
    static_configs:
      - targets: ['localhost']
        labels:
          job: nginx
          __path__: /var/log/nginx/*.log