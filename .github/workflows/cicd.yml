name: CI/CD Deploy Backend

on:
  push:
    branches:
      - develop
      - feature/#62

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create Firebase directory
        run: mkdir -p src/main/resources/firebase

      - name: Create Firebase service account key
        uses: jsdaniell/create-json@v1.2.2
        with:
          name: "serviceAccountKey.json"
          json: ${{ secrets.FCM_ACCOUNT }}
          dir: './src/main/resources/firebase/'

      - name: Build Docker image
        run: |
          docker build -t pawong/backend:latest .

      - name: Push Docker image
        run: |
          docker push pawong/backend:latest

      - name: Deploy to remote server
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ubuntu
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /home/ubuntu/deploy
            sudo docker compose down
            sudo docker rmi pawong/backend:latest || true
            sudo docker compose pull
            sudo docker compose up -d
