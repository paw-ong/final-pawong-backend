spring:
  datasource:
    url: jdbc:mysql://localhost:3306/pawong
    username: pawong
    password: pawong
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      # 스키마 생성/수정
      ddl-auto: update
    # SQL 로그
#    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
  elasticsearch:
    uris: http://localhost:9200
  data:
    redis:
      host: localhost
      port: 6379
app:
  image:
    proxy:
      enabled: false