spring:
  config:
    import: optional:file:.env[.properties]
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID} # REST API key
            client-secret: ${KAKAO_CLIENT_SECRET} # Admin key
            authorization-grant-type: authorization_code
            redirect-uri: "${BASE_URL}/login/oauth2/code/kakao"
            client-authentication-method: client_secret_post
            scope: profile_nickname, profile_image
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
    jwt:
      secret-key: ${JWT_SECRET_KEY}
    base-url: ${BASE_URL}
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false # 프로젝트 실행 시 자동으로 배치 실행되게 하고 싶으면 true로 변경
  ai:
    openai:
      api-key: ${OPEN_AI_KEY}
      chat:
        options:
          # Open AI model: https://platform.openai.com/docs/models
          model: ${OPEN_AI_MODEL}
          temperature: 1.0
      embedding:
        options:
          model: text-embedding-ada-002
    huggingface:
      chat:
        # huggingface에서 제공하는 API 중 'HF Inference API'을 활용.
        url: https://router.huggingface.co/hf-inference
        api-key: ${HUGGINGFACE_API_KEY}
        model: Qwen/QwQ-32B
      embedding:
        model: ai-human-lab/EEVE-Korean-10.8B-SFT-v0.1
api:
  service-key: ${SERVICE_KEY}
data:
  elasticsearch:
    schema-management:
      create-index: false
      create-mappings: false
api-url:
  adoption: ${ADOPTION_URL}
  shelter: ${SHELTER_URL}
cloud:
  aws:
    region: ${AWS_REGION}
    s3:
      access-key: ${AWS_ACCESS_KEY_ID}
      secret-key: ${AWS_SECRET_ACCESS_KEY_ID}
      bucket-name: ${BUCKET_NAME}