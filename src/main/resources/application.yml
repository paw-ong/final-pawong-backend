spring:
  config:
    import:
      - optional:file:.env[.properties]
      - classpath:config/ai.yml
      - classpath:config/security.yml
      - classpath:config/mail.yml
      - classpath:config/kafka.yml
  data:
    redis:
      host: ${REDIS_URI}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
cloud:
  aws:
    region: ${AWS_REGION}
    s3:
      access-key: ${AWS_ACCESS_KEY_ID}
      secret-key: ${AWS_SECRET_ACCESS_KEY_ID}
      bucket-name: ${BUCKET_NAME}
api:
  service-key: ${SERVICE_KEY}
data:
  elasticsearch:
    schema-management:
      create-index: false
      create-mappings: false
api-url:
  adoption: ${ADOPTION_URL}
  shelter: ${SHELTER_URL}
logging:
  level:
    org:
      apache:
        kafka: WARN
      springframework:
        kafka: WARN
app:
  firebase-configuration-file: firebase/serviceAccountKey.json
  image:
    proxy:
      base-url: ${PROXY_URL}