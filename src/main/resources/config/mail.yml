spring:
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_ID}
    password: ${MAIL_APP_KEY}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: true
      ssl:
        enabled: true
    auth-code-expiration-millis: 1800000  # 30 * 60 * 1000 == 30분