services:
  elasticsearch:
    build:
      context: ./infra/elasticsearch
      dockerfile: Dockerfile
      args:
        ELK_VERSION: ${ELK_VERSION}
    container_name: pawong-local-elasticsearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=${ES_JAVA_OPTS}
      - xpack.security.enabled=false
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - ELASTICSEARCH_PLUGINS=analysis-nori
    volumes:
      - ./infra/elasticsearch/config/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
      - ./infra/elasticsearch/data:/usr/share/elasticsearch/data
    ports:
      - "${ELASTIC_PORT}:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - local-net

  kibana:
    image: kibana:${ELK_VERSION}
    container_name: pawong-local-kibana
    depends_on:
      - elasticsearch
    ports:
      - "${KIBANA_PORT}:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    networks:
      - local-net

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: pawong-local-zk
    environment:
      ZOOKEEPER_CLIENT_PORT: ${ZK_CLIENT_PORT:-2181}
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "${ZK_CLIENT_PORT:-2181}:2181"
    volumes:
      - ./infra/broker/zookeeper:/var/lib/zookeeper
    networks:
      - local-net

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: pawong-local-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: ${KAFKA_ADVERTISED_LISTENERS}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    ports:
      - "${KAFKA_EXTERNAL_PORT:-9092}:9092"
    volumes:
      - ./infra/broker/kafka:/var/lib/kafka
    networks:
      - local-net

  nginx:
    image: nginx:latest
    container_name: pawong-local-nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/conf/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/nginx/logs:/var/log/nginx
    depends_on:
      - elasticsearch
      - kibana
    networks:
      - local-net

volumes:
  mysql-data:

networks:
  local-net:
    driver: bridge
